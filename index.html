<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>Testovací stránka — Feedback Tool</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; }
    .hero { background: #1a1a2e; color: white; padding: 60px 40px; border-radius: 8px; margin-bottom: 24px; }
    .hero h1 { font-size: 2rem; margin-bottom: 12px; }
    .hero p { opacity: .7; }
    .card-row { display: flex; gap: 16px; }
    .card { flex: 1; background: #f5f5f5; padding: 20px; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="hero">
    <h1>Moderní řešení pro váš byznys</h1>
    <p>Pomáháme firmám růst prostřednictvím strategického designu.</p>
    <button>Začít spolupráci</button>
  </div>
  <div class="card-row">
    <div class="card"><h3>Strategie</h3><p>Definujeme cíle spolu s vámi.</p></div>
    <div class="card"><h3>Design</h3><p>Vizuální identita vaší značky.</p></div>
    <div class="card"><h3>Technologie</h3><p>Vývoj na míru.</p></div>
  </div>
  <script type="module" src="/src/index.js"></script>
</body>
</html>
